{{define "logs_body"}}
<!-- Breadcrumb -->
<nav class="mb-4 text-xs font-medium text-zinc-500 dark:text-zinc-400 flex items-center gap-1.5">
  <a href="/admin/benches" class="hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">Benches</a>
  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
  <a href="/admin/benches/{{.Bench}}" class="hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors">{{.Bench}}</a>
  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
  <span class="text-zinc-900 dark:text-zinc-200">Compose Logs</span>
</nav>

<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 pb-6 border-b border-zinc-200 dark:border-zinc-800">
  <div>
    <h1 class="text-3xl font-bold tracking-tight text-zinc-900 dark:text-zinc-50">Compose Logs</h1>
    <p class="text-zinc-500 dark:text-zinc-400 text-sm mt-1">
      Live docker service streams for bench <span class="font-semibold text-zinc-800 dark:text-zinc-200 font-mono text-xs bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded">{{.Bench}}</span>.
    </p>
  </div>
  
  <div class="flex flex-wrap items-center gap-2 text-xs font-semibold">
    <div class="flex items-center gap-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 px-3 py-1.5">
      <span class="text-zinc-400 dark:text-zinc-500">Service Filter:</span>
      <span class="text-zinc-800 dark:text-zinc-200 font-mono">{{if .Service}}{{.Service}}{{else}}All Services{{end}}</span>
    </div>
    
    <div id="logs-live-indicator" class="flex items-center gap-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 px-3 py-1.5 text-zinc-400">
      <span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span>
      <span class="text-emerald-600 dark:text-emerald-400">Streaming Live</span>
    </div>
  </div>
</div>

<!-- Terminal Log Container -->
<div class="bg-zinc-950 rounded-xl border border-zinc-800/80 shadow-lg overflow-hidden flex flex-col max-w-5xl">
  <!-- Terminal Header Bar -->
  <div class="px-4 py-3 bg-[#0d0d10] border-b border-zinc-900 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="flex gap-1.5">
        <span class="w-3 h-3 rounded-full bg-rose-500/80"></span>
        <span class="w-3 h-3 rounded-full bg-amber-500/80"></span>
        <span class="w-3 h-3 rounded-full bg-emerald-500/80"></span>
      </div>
      <span class="text-xs text-zinc-500 font-mono font-medium ml-2">Docker Compose Stream</span>
    </div>
    <div class="flex gap-2">
      <button class="text-xs text-zinc-400 hover:text-zinc-100 font-medium font-mono border border-zinc-800 hover:border-zinc-700 px-2 py-0.5 rounded transition-colors focus:outline-none" id="clear-log-btn">
        Clear Output
      </button>
      <button class="text-xs text-zinc-400 hover:text-zinc-100 font-medium font-mono border border-zinc-800 hover:border-zinc-700 px-2 py-0.5 rounded transition-colors focus:outline-none" id="copy-log-btn">
        Copy Viewport
      </button>
    </div>
  </div>
  
  <!-- Pre Container -->
  <div class="p-5 overflow-auto h-[60vh] md:h-[65vh]" id="logs-scroll">
    <pre id="log-stream" class="text-zinc-300 font-mono text-xs md:text-sm leading-relaxed whitespace-pre-wrap select-text">Connecting to Docker Compose service logger…</pre>
  </div>
</div>

<script>
(function(){
  var bench = {{printf "%q" .Bench}};
  var svc = {{printf "%q" .Service}};
  var url = '/admin/benches/' + encodeURIComponent(bench) + '/logs/stream?service=' + encodeURIComponent(svc);
  var el = document.getElementById('log-stream');
  var scrollContainer = document.getElementById('logs-scroll');
  var indicator = document.getElementById('logs-live-indicator');
  
  function scrollToBottom() {
    if (scrollContainer) {
      scrollContainer.scrollTop = scrollContainer.scrollHeight;
    }
  }

  // Clear handler
  var clearBtn = document.getElementById('clear-log-btn');
  if (clearBtn && el) {
    clearBtn.addEventListener('click', function() {
      el.textContent = '';
    });
  }

  // Copy logs handler
  var copyBtn = document.getElementById('copy-log-btn');
  if (copyBtn && el) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(el.innerText).then(function() {
        var orig = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(function() { copyBtn.textContent = orig; }, 1500);
      });
    });
  }

  if (!window.EventSource) { 
    el.textContent = 'Error: EventSource is not supported by this browser.'; 
    return; 
  }
  
  var es = new EventSource(url);
  
  // Connection established
  es.onopen = function() {
    el.textContent = '[Docker Compose Log Stream Connected]\n\n';
  };

  es.onmessage = function(ev) { 
    el.textContent += ev.data + '\n'; 
    scrollToBottom(); 
  };
  
  es.onerror = function() { 
    el.textContent += '\n\n[Log stream connection closed or timed out]\n'; 
    scrollToBottom();
    es.close(); 
    if (indicator) {
      indicator.innerHTML = '<svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg><span class="text-zinc-500 font-semibold">Disconnected</span>';
    }
  };
})();
</script>
{{end}}
